  - generic [ref=e140]:
    - generic [ref=e141]: The Problem
    - heading "AI is Expanding Beyond Models" [level=2] [ref=e142]
    - paragraph [ref=e143]: Organizations need to govern agents, MCP servers, prompts, skills, and more. The current model registry was not purpose-built for this — it was built for models and extended. Building a bespoke registry for each new asset type does not scale.
    - generic [ref=e144]:
      - generic [ref=e145]: The Reality Today
      - paragraph [ref=e146]:
        - text: In RHOAI 3.4, an MCP server goes from catalog to consumption through
        - strong [ref=e147]: 5 steps across 4 disconnected systems
        - text: ", with"
        - strong [ref=e148]: 2 manual hand-offs
        - text: and
        - strong [ref=e149]: zero governance checkpoints
        - text: . No system records who approved it, what version is deployed, or whether it passed security scanning. Now imagine doing this for agents, skills, prompts, guardrails, and every future AI asset type.
    - generic [ref=e150]:
      - generic [ref=e151]:
        - img [ref=e153]
        - generic [ref=e155]:
          - heading "Fragmented Governance" [level=3] [ref=e156]
          - paragraph [ref=e157]: Each new AI asset type would need its own registry effort. Duplicated work, inconsistent UX, slower time-to-market for new asset support.
      - generic [ref=e158]:
        - img [ref=e160]
        - generic [ref=e163]:
          - heading "Manual Stitching" [level=3] [ref=e164]
          - paragraph [ref=e165]: Today, connecting catalog → deployment → gateway → Studio requires manual steps at every stage. Fragile and ungoverned.
      - generic [ref=e166]:
        - img [ref=e168]
        - generic [ref=e171]:
          - heading "No Source of Truth" [level=3] [ref=e172]
          - paragraph [ref=e173]: No single system knows which assets are approved, deployed, consumable, or how they relate to each other.
      - generic [ref=e174]:
        - img [ref=e176]
        - generic [ref=e180]:
          - heading "Agent Sprawl" [level=3] [ref=e181]
          - paragraph [ref=e182]: Enterprises face uncontrolled proliferation of agents, models, and tools. "DIY proliferation" creates risk, not value.
