    - generic [ref=e185]: The Solution
    - heading "Three Parts, One Framework" [level=2] [ref=e186]
    - paragraph [ref=e187]: The AI Asset Registry spans three distinct areas. The plugin architecture is what we are proposing now. Gen AI Studio already exists. The ecosystem is what comes next.
    - generic [ref=e188]:
      - img [ref=e190]
      - generic [ref=e194]:
        - generic [ref=e195]: What "Plugin Architecture" Means Concretely
        - paragraph [ref=e196]:
          - text: The plugin model extends MLflow's artifact type system so each AI asset type registers as a
          - strong [ref=e197]: typed plugin
          - text: with its own metadata schema, lifecycle states, and governance rules — without forking or rebuilding the core registry. One framework, many asset types, zero bespoke registries.
